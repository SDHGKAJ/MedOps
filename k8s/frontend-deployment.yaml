apiVersion: apps/v1
kind: Deployment
metadata:
  name: medops-frontend
  labels:
    app: medops-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medops-frontend
  template:
    metadata:
      labels:
        app: medops-frontend
    spec:
      containers:
      - name: frontend
        image: medops-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
