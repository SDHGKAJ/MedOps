version: '3.8'
services:
  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/medops
      - PORT=5000
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80" # Exposed on port 8080 to avoid conflicts
    depends_on:
      - backend

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
